name: QA Automation CI
# هذا يعني أن الاختبارات ستعمل تلقائياً عند كل عملية Push
on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Automation Tests
        run: npm test